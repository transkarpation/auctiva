<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal</title>
  <script>
    // ColorSchemeScript equivalent: avoids light/dark flash before React mounts
    (function () {
      try {
        var s = localStorage.getItem('mantine-color-scheme-value') || 'dark';
        document.documentElement.setAttribute('data-mantine-color-scheme', s === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : s);
      } catch (e) { }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
